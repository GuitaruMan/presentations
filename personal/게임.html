<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 - My Presentations</title>
<style>
  :root { --bg: #f5f6f8; --card: #ffffff; --ink: #1c2230; --ink-soft: #5b6270; --accent: #3a5ba0; --shadow: rgba(28, 34, 48, 0.10); }
  @media (prefers-color-scheme: dark) { :root { --bg: #14161c; --card: #1f232c; --ink: #eceef2; --ink-soft: #a3aab8; --accent: #7fa2e0; --shadow: rgba(0,0,0,0.4); } }
  :root[data-theme="dark"] { --bg: #14161c; --card: #1f232c; --ink: #eceef2; --ink-soft: #a3aab8; --accent: #7fa2e0; --shadow: rgba(0,0,0,0.4); }
  :root[data-theme="light"] { --bg: #f5f6f8; --card: #ffffff; --ink: #1c2230; --ink-soft: #5b6270; --accent: #3a5ba0; --shadow: rgba(28, 34, 48, 0.10); }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 6vh 5vw 4vh; }
  .top { width: 100%; max-width: 700px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; }
  a.back { color: var(--ink-soft); text-decoration: none; font-size: 0.9rem; }
  a.back:hover { color: var(--accent); }
  h1 { font-size: 1.6rem; margin: 0.5rem 0 2.5rem; }
  .empty { color: var(--ink-soft); font-size: 0.95rem; margin-top: 2rem; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem; width: 100%; max-width: 700px;
  }
  a.card {
    background: var(--card); border-radius: 16px; padding: 1.6rem 1.4rem; text-align: left;
    text-decoration: none; color: var(--ink); box-shadow: 0 4px 16px var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  a.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
  .card .icon2 { font-size: 1.6rem; }
  .card .label { font-size: 1.02rem; font-weight: 600; }
  .card .updated { font-size: 0.75rem; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="top">
    <a class="back" href="../personal.html">&larr; 개인용</a>
    <a class="back" href="../index.html">홈으로</a>
  </div>
  <h1>🎮 게임</h1>
  <div class="grid">
    <a class="card" href="게임/붉은사막-레어방어구.html">
      <div class="icon2">🛡️</div>
      <div class="label">붉은사막 - 레어 방어구 획득 가이드</div>
      <div class="updated" data-updated></div>
    </a>
    <a class="card" href="게임/붉은사막-전설장비.html">
      <div class="icon2">⚔️</div>
      <div class="label">붉은사막 - 전설 장비 위치 정리</div>
      <div class="updated" data-updated></div>
    </a>
  </div>
  <script>
    const now = new Date().toLocaleString("ko-KR");
    document.querySelectorAll('[data-updated]').forEach(el => {
      el.textContent = "업데이트: " + now;
    });
  </script>
</body>
</html>

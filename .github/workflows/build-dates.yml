name: Build file dates

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate dates.json
        run: |
          echo "{" > dates.json
          first=true
          while IFS= read -r -d '' file; do
            date=$(git log -1 --format=%cd --date=format:%Y-%m-%d -- "$file")
            if [ -z "$date" ]; then
              continue
            fi
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> dates.json
            fi
            key=$(echo "$file" | sed 's/\\/\//g' | sed 's/"/\\"/g')
            printf '"%s": "%s"' "$key" "$date" >> dates.json
          done < <(find . -name "*.html" -not -path "./.git/*" -print0)
          echo "}" >> dates.json
          cat dates.json

      - name: Commit dates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dates.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update dates.json [skip ci]"
          git push

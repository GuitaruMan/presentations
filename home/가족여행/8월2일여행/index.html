<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순천 · 사천 · 통영 가족여행</title>
<style>
  @font-face { font-family: 'system'; src: local('Pretendard'); }
  :root{
    --navy:#0B4F6C;
    --navy-deep:#083A50;
    --cream:#F7F3E8;
    --coral:#FF6B4A;
    --teal:#2D8577;
    --ink:#1C2B2E;
    --paper:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }
  .waves{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(11,79,108,0.08), transparent),
      radial-gradient(ellipse 60% 40% at 90% 90%, rgba(255,107,74,0.08), transparent);
  }
  .container{
    position:relative; z-index:1;
    max-width:960px; margin:0 auto; padding:0 24px;
  }
  header{
    padding:80px 0 40px;
    text-align:center;
  }
  .eyebrow{
    font-size:13px; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--teal); font-weight:700; margin-bottom:20px;
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-size:clamp(36px, 6vw, 64px);
    font-weight:900;
    color:var(--navy-deep);
    line-height:1.2;
    letter-spacing:-0.01em;
  }
  h1 .accent{ color:var(--coral); }
  .dates{
    margin-top:20px;
    font-size:18px;
    color:var(--navy);
    font-weight:500;
  }
  .dates b{ color:var(--navy-deep); font-weight:800; }
  .route-line{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-top:32px; flex-wrap:wrap;
  }
  .route-stop{
    font-family:'Noto Serif KR', serif;
    font-weight:700; font-size:17px;
    padding:8px 18px;
    border-radius:999px;
    background:var(--paper);
    border:2px solid var(--navy);
    color:var(--navy-deep);
  }
  .route-stop.hi{ background:var(--coral); border-color:var(--coral); color:white; }
  .route-arrow{ color:var(--teal); font-size:20px; font-weight:900; }

  .cards{
    display:grid; grid-template-columns:1fr 1fr; gap:28px;
    padding:40px 0 100px;
  }
  @media (max-width:680px){ .cards{ grid-template-columns:1fr; } }

  .card{
    position:relative;
    display:block;
    text-decoration:none;
    background:var(--paper);
    border-radius:20px;
    padding:40px 32px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(11,79,108,0.10);
    transition:transform .25s ease, box-shadow .25s ease;
    border:1px solid rgba(11,79,108,0.08);
  }
  .card:hover{
    transform:translateY(-6px);
    box-shadow:0 16px 40px rgba(11,79,108,0.18);
  }
  .card .icon{
    font-size:40px; margin-bottom:18px; display:block;
  }
  .card h2{
    font-family:'Noto Serif KR', serif;
    font-size:28px; font-weight:800;
    color:var(--navy-deep);
    margin-bottom:10px;
  }
  .card p{
    font-size:15px; color:#5a6a6d; line-height:1.6; margin-bottom:20px;
  }
  .card .go{
    display:inline-flex; align-items:center; gap:6px;
    font-weight:700; font-size:14px;
    color:var(--coral);
  }
  .card .go svg{ width:14px; height:14px; transition:transform .2s; }
  .card:hover .go svg{ transform:translateX(4px); }

  .card.itinerary{ border-top:5px solid var(--navy); }
  .card.food{ border-top:5px solid var(--coral); }

  footer{
    text-align:center; padding:0 0 60px;
    font-size:13px; color:#8a9a9d;
  }
  .top-nav{
    display:flex; justify-content:space-between; max-width:960px; margin:0 auto;
    padding:20px 24px 0; font-size:13px;
  }
  .top-nav a{ color:var(--navy); text-decoration:none; font-weight:700; }
  .top-nav a:hover{ color:var(--coral); }
</style>
</head>
<body>
<div class="waves"></div>
<div class="top-nav">
  <a href="../가족여행.html">← 가족 여행</a>
  <a href="../../../index.html">홈으로</a>
</div>
<div class="container">
  <header>
    <div class="eyebrow">Family Trip · 4 Families</div>
    <h1>순천 · 사천 · 통영<br><span class="accent">여름 바다 가족여행</span></h1>
    <div class="dates"><b>2026.08.02(일) — 08.04(화)</b> · 2박 3일 · 자가용</div>
    <div class="route-line">
      <span class="route-stop">대구</span>
      <span class="route-arrow">→</span>
      <span class="route-stop">구례</span>
      <span class="route-arrow">→</span>
      <span class="route-stop hi">순천</span>
      <span class="route-arrow">→</span>
      <span class="route-stop hi">사천</span>
      <span class="route-arrow">→</span>
      <span class="route-stop hi">통영</span>
      <span class="route-arrow">→</span>
      <span class="route-stop">대구</span>
    </div>
  </header>

  <div class="cards">
    <a class="card itinerary" href="itinerary.html">
      <span class="icon">🗺️</span>
      <h2>일정표</h2>
      <p>Day 1~3 시간대별 코스, 이동시간, 대체 옵션까지 한 눈에 정리했습니다.</p>
      <span class="go">일정 보러가기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
    </a>
    <a class="card food" href="food.html">
      <span class="icon">🍚</span>
      <h2>맛집 가이드</h2>
      <p>끼니별로 골라둔 순천 · 사천 · 통영 맛집과 통영 중앙시장 먹거리까지.</p>
      <span class="go">맛집 보러가기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
    </a>
  </div>

  <footer>필수 코스: 사천 아라마루 아쿠아리움 · 통영 장사도 · 순천 웃장국밥</footer>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주현이 - My Presentations</title>
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --ink: #1c2230; --ink-soft: #5b6270;
    --accent: #3a5ba0; --shadow: rgba(28, 34, 48, 0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14161c; --card: #1f232c; --ink: #eceef2; --ink-soft: #a3aab8; --accent: #7fa2e0; --shadow: rgba(0,0,0,0.4); }
  }
  :root[data-theme="dark"] { --bg: #14161c; --card: #1f232c; --ink: #eceef2; --ink-soft: #a3aab8; --accent: #7fa2e0; --shadow: rgba(0,0,0,0.4); }
  :root[data-theme="light"] { --bg: #f5f6f8; --card: #ffffff; --ink: #1c2230; --ink-soft: #5b6270; --accent: #3a5ba0; --shadow: rgba(28, 34, 48, 0.10); }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 6vh 5vw 4vh;
  }
  .top { width: 100%; max-width: 700px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; }
  a.back { color: var(--ink-soft); text-decoration: none; font-size: 0.9rem; }
  a.back:hover { color: var(--accent); }
  h1 { font-size: 1.6rem; margin: 0.5rem 0 2.5rem; }
  .list { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 1rem; }
  a.item {
    background: var(--card); border-radius: 14px; padding: 1.2rem 1.5rem;
    text-decoration: none; color: var(--ink); box-shadow: 0 3px 12px var(--shadow);
    display: flex; align-items: center; gap: 1rem; transition: transform 0.15s ease;
  }
  a.item:hover { transform: translateX(4px); }
  .doc-icon { font-size: 1.5rem; }
  .empty { color: var(--ink-soft); font-size: 0.95rem; margin-top: 2rem; }
</style>
</head>
<body>
  <div class="top">
    <a class="back" href="../home.html">&larr; 가정용</a>
    <a class="back" href="../index.html">홈으로</a>
  </div>
  <h1>👦 주현이</h1>
  <div class="list">
    <a class="item" href="../겨울방학_탐구보고서_지브리풍.html">

      <span>겨울방학 탐구 보고서 - 다양한 직업 체험</span>
    </a>
  </div>

</html>

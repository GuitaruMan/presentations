<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Presentations</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1c2230;
    --ink-soft: #5b6270;
    --accent: #3a5ba0;
    --shadow: rgba(28, 34, 48, 0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161c;
      --card: #1f232c;
      --ink: #eceef2;
      --ink-soft: #a3aab8;
      --accent: #7fa2e0;
      --shadow: rgba(0, 0, 0, 0.4);
    }
  }
  :root[data-theme="dark"] {
    --bg: #14161c;
    --card: #1f232c;
    --ink: #eceef2;
    --ink-soft: #a3aab8;
    --accent: #7fa2e0;
    --shadow: rgba(0, 0, 0, 0.4);
  }
  :root[data-theme="light"] {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1c2230;
    --ink-soft: #5b6270;
    --accent: #3a5ba0;
    --shadow: rgba(28, 34, 48, 0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8vh 5vw 4vh;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 0.4rem;
  }
  p.sub {
    color: var(--ink-soft);
    margin: 0 0 3rem;
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 900px;
  }
  a.card {
    background: var(--card);
    border-radius: 16px;
    padding: 2.2rem 1.5rem;
    text-align: center;
    text-decoration: none;
    color: var(--ink);
    box-shadow: 0 4px 16px var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }
  a.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px var(--shadow);
  }
  .icon { font-size: 2.2rem; }
  .label { font-size: 1.1rem; font-weight: 600; }
  .desc { font-size: 0.85rem; color: var(--ink-soft); }
  footer {
    margin-top: 4rem;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
  <h1>My Presentations</h1>
  <p class="sub">카테고리를 선택하세요</p>
  <div class="grid">
    <a class="card" href="work.html">
      <div class="icon">💼</div>
      <div class="label">업무용</div>
      <div class="desc">교육과정 · 입시 · 수업 · 연구회</div>
    </a>
    <a class="card" href="home.html">
      <div class="icon">🏠</div>
      <div class="label">가정용</div>
      <div class="desc">가족 관련 자료</div>
    </a>
    <a class="card" href="personal.html">
      <div class="icon">🔒</div>
      <div class="label">개인용</div>
      <div class="desc">비밀번호 필요</div>
    </a>
  </div>
  <footer>Made with Claude</footer>
</body>
</html>
